<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <circle cx="50" cy="50" r="46" fill="#FFF2F2" stroke="#FF7675" stroke-width="3" />
  <!-- Round Daruma body -->
  <circle cx="50" cy="52" r="38" fill="#FF7675" stroke="#D63031" stroke-width="3"/>
  <!-- White Face Area -->
  <path d="M50,22 C33,22 31,56 37,67 C41,75 59,75 63,67 C69,56 67,22 50,22 Z" fill="#FFF"/>
  <!-- Golden whiskers / Beard -->
  <path d="M37,56 Q50,65 63,56" stroke="#FFEAA7" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Eyebrows (bold cranes) -->
  <path d="M37,36 Q43,32 46,38" stroke="#2D3436" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M63,36 Q57,32 54,38" stroke="#2D3436" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- One pupil painted (luck wish) -->
  <circle cx="41" cy="44" r="5" fill="#2D3436"/>
  <!-- Other eye blank -->
  <circle cx="59" cy="44" r="5" fill="#FFF" stroke="#2D3436" stroke-width="1.5"/>
