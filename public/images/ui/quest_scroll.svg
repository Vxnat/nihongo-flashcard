<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="scrollPaperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF9" />
      <stop offset="100%" stop-color="#FFF1D6" />
    </linearGradient>
    <linearGradient id="rollGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EAA15F" />
      <stop offset="100%" stop-color="#B36928" />
    </linearGradient>
  </defs>
  
  <!-- Outer border shadow -->
  <rect x="14" y="8" width="36" height="48" rx="3" fill="#FFE2D1" />
  
  <!-- Main Scroll Paper Body -->
  <rect x="12" y="6" width="40" height="52" rx="3" fill="url(#scrollPaperGrad)" stroke="#8C6D58" stroke-width="4" stroke-linejoin="round" />
  
  <!-- Top Roll (Thanh cuộn trên) -->
  <rect x="8" y="2" width="48" height="8" rx="4" fill="url(#rollGrad)" stroke="#8C6D58" stroke-width="4" stroke-linejoin="round" />
  <circle cx="8" cy="6" r="4" fill="#FFD166" stroke="#8C6D58" stroke-width="3" />
  <circle cx="56" cy="6" r="4" fill="#FFD166" stroke="#8C6D58" stroke-width="3" />

  <!-- Bottom Roll (Thanh cuộn dưới) -->
  <rect x="8" y="54" width="48" height="8" rx="4" fill="url(#rollGrad)" stroke="#8C6D58" stroke-width="4" stroke-linejoin="round" />
  <circle cx="8" cy="58" r="4" fill="#FFD166" stroke="#8C6D58" stroke-width="3" />
  <circle cx="56" cy="58" r="4" fill="#FFD166" stroke="#8C6D58" stroke-width="3" />
  
  <!-- Text lines -->
  <rect x="20" y="18" width="24" height="4" rx="2" fill="#E6D3C3" />
  <rect x="20" y="26" width="24" height="4" rx="2" fill="#E6D3C3" />
  <rect x="20" y="34" width="16" height="4" rx="2" fill="#E6D3C3" />
  
  <!-- Small red stamp/seal (Dấu mộc đỏ hình bàn chân Shiba) -->
  <circle cx="40" cy="44" r="5" fill="#FF7096" stroke="#8C6D58" stroke-width="2" />
  <circle cx="40" cy="44" r="2" fill="#FFF" />
  <circle cx="37.5" cy="40.5" r="0.8" fill="#FFF" />
  <circle cx="40" cy="39.5" r="0.8" fill="#FFF" />
  <circle cx="42.5" cy="40.5" r="0.8" fill="#FFF" />
</svg>
