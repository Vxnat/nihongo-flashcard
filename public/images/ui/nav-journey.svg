<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="mapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF9" />
      <stop offset="100%" stop-color="#FFF0DB" />
    </linearGradient>
    <linearGradient id="flagGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF5D5D" />
      <stop offset="100%" stop-color="#D93838" />
    </linearGradient>
  </defs>
  <!-- Background Board/Paper Shadow -->
  <path d="M6 14 C 18 10, 46 10, 58 14 L 58 50 C 46 46, 18 46, 6 50 Z" fill="#FFE2D1" />
  <!-- Map Paper Body -->
  <path d="M6 12 C 18 8, 46 8, 58 12 L 58 48 C 46 44, 18 44, 6 48 Z" fill="url(#mapGrad)" stroke="#8C6D58" stroke-width="4" stroke-linejoin="round" />
  
  <!-- Dashed Track/Path -->
  <path d="M14 36 C 22 28, 28 42, 38 30 C 42 26, 42 20, 48 20" fill="none" stroke="#8C6D58" stroke-width="3" stroke-linecap="round" stroke-dasharray="1 6" />
  
  <!-- Map Marks: Mountain -->
  <path d="M12 24 L 16 17 L 20 24 Z" fill="#A8E6CF" stroke="#8C6D58" stroke-width="3" stroke-linejoin="round" />
  <path d="M17 24 L 20 19 L 23 24 Z" fill="#D8F3DC" stroke="#8C6D58" stroke-width="3" stroke-linejoin="round" />

  <!-- Map Marks: Sea Waves -->
  <path d="M48 38 C 50 38, 51 37, 52 38 M 46 41 C 48 41, 49 40, 50 41" fill="none" stroke="#8C6D58" stroke-width="2" stroke-linecap="round" />
  
  <!-- Start Point (Red Circle) -->
  <circle cx="14" cy="36" r="4.5" fill="#FFF" stroke="#FF7096" stroke-width="3" />
  
  <!-- Flag Pin -->
  <path d="M46 12 L 52 16 L 46 20 Z" fill="url(#flagGrad)" stroke="#8C6D58" stroke-width="3" stroke-linejoin="round" />
  <path d="M46 12 L 46 28" stroke="#8C6D58" stroke-width="3" stroke-linecap="round" />
</svg>
