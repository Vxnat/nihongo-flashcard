<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bagGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#70A6FF" />
      <stop offset="100%" stop-color="#407CD0" />
    </linearGradient>
    <linearGradient id="pocketGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8EBAFF" />
      <stop offset="100%" stop-color="#5B93E3" />
    </linearGradient>
  </defs>
  <!-- Handle shadow -->
  <path d="M26 12 C 26 8, 38 8, 38 12" fill="none" stroke="#FFE2D1" stroke-width="8" stroke-linecap="round" />
  <!-- Handle -->
  <path d="M26 11 C 26 7, 38 7, 38 11" fill="none" stroke="#8C6D58" stroke-width="4" stroke-linecap="round" />
  
  <!-- Straps shadow -->
  <rect x="14" y="20" width="10" height="24" rx="5" fill="#FFE2D1" />
  <rect x="40" y="20" width="10" height="24" rx="5" fill="#FFE2D1" />
  <!-- Straps -->
  <rect x="14" y="18" width="10" height="24" rx="5" fill="#FF9E00" stroke="#8C6D58" stroke-width="4" />
  <rect x="40" y="18" width="10" height="24" rx="5" fill="#FF9E00" stroke="#8C6D58" stroke-width="4" />
  
  <!-- Main Bag Body -->
  <rect x="12" y="16" width="40" height="38" rx="12" fill="url(#bagGrad)" stroke="#8C6D58" stroke-width="4" />
  
  <!-- Outer Pocket -->
  <rect x="20" y="32" width="24" height="18" rx="6" fill="url(#pocketGrad)" stroke="#8C6D58" stroke-width="4" />
  <!-- Pocket Flap / Zipper line -->
  <path d="M20 37 L 44 37" stroke="#8C6D58" stroke-width="3" stroke-linecap="round" />
  <!-- Cute tag/button -->
  <circle cx="32" cy="44" r="3" fill="#FFD166" stroke="#8C6D58" stroke-width="2" />
</svg>
