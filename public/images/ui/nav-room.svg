<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF9E79" />
      <stop offset="100%" stop-color="#F25C3C" />
    </linearGradient>
    <linearGradient id="houseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF5E6" />
      <stop offset="100%" stop-color="#FFDDAD" />
    </linearGradient>
  </defs>
  <!-- Roof shadow -->
  <polygon points="32,6 4,32 60,32" fill="#FFE2D1" transform="translate(0, 3)" />
  
  <!-- House Base/Walls -->
  <rect x="10" y="28" width="44" height="28" rx="4" fill="url(#houseGrad)" stroke="#8C6D58" stroke-width="4" stroke-linejoin="round" />
  
  <!-- Door Hole -->
  <path d="M22 56 L 22 42 C 22 36, 42 36, 42 42 L 42 56 Z" fill="#5F4B3E" stroke="#8C6D58" stroke-width="4" stroke-linejoin="round" />
  
  <!-- Roof -->
  <polygon points="32,6 2,30 10,32 32,12 54,32 62,30" fill="url(#roofGrad)" stroke="#8C6D58" stroke-width="4" stroke-linejoin="round" stroke-linecap="round" />
  
  <!-- Cute Bone decoration above door -->
  <g transform="translate(32, 23)">
    <circle cx="-6" cy="-2" r="2.5" fill="#FFF" stroke="#8C6D58" stroke-width="3" />
    <circle cx="-6" cy="2" r="2.5" fill="#FFF" stroke="#8C6D58" stroke-width="3" />
    <circle cx="6" cy="-2" r="2.5" fill="#FFF" stroke="#8C6D58" stroke-width="3" />
    <circle cx="6" cy="2" r="2.5" fill="#FFF" stroke="#8C6D58" stroke-width="3" />
    <!-- Cover/Center body of the bone -->
    <rect x="-6" y="-2" width="12" height="4" fill="#FFF" />
    <line x1="-6" y1="-2" x2="6" y2="-2" stroke="#8C6D58" stroke-width="3" />
    <line x1="-6" y1="2" x2="6" y2="2" stroke="#8C6D58" stroke-width="3" />
  </g>
</svg>
