<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="shopWall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF9" />
      <stop offset="100%" stop-color="#FFEED5" />
    </linearGradient>
  </defs>
  
  <!-- Stall structure shadow -->
  <rect x="10" y="26" width="44" height="30" rx="4" fill="#FFE2D1" />
  
  <!-- Stall main wall -->
  <rect x="10" y="24" width="44" height="32" rx="4" fill="url(#shopWall)" stroke="#8C6D58" stroke-width="4" stroke-linejoin="round" />
  
  <!-- Shop window counter -->
  <rect x="16" y="32" width="32" height="16" rx="2" fill="#E6D3C3" stroke="#8C6D58" stroke-width="3" />
  <line x1="32" y1="32" x2="32" y2="48" stroke="#8C6D58" stroke-width="3" />
  
  <!-- Stripe Awning (Mái hiên kẻ sọc hồng - trắng) -->
  <!-- Awning shape shadow -->
  <polygon points="6,24 58,24 52,12 12,12" fill="#FFE2D1" />
  <!-- Awning stripes -->
  <path d="M6 24 L12 12 L18 12 L15 24 Z" fill="#FF7096" stroke="#8C6D58" stroke-width="4" stroke-linejoin="round" />
  <path d="M15 24 L18 12 L24 12 L24 24 Z" fill="#FFFFFF" stroke="#8C6D58" stroke-width="4" stroke-linejoin="round" />
  <path d="M24 24 L24 12 L30 12 L33 24 Z" fill="#FF7096" stroke="#8C6D58" stroke-width="4" stroke-linejoin="round" />
  <path d="M33 24 L30 12 L36 12 L39 24 Z" fill="#FFFFFF" stroke="#8C6D58" stroke-width="4" stroke-linejoin="round" />
  <path d="M39 24 L36 12 L42 12 L45 24 Z" fill="#FF7096" stroke="#8C6D58" stroke-width="4" stroke-linejoin="round" />
  <path d="M45 24 L42 12 L48 12 L48 24 Z" fill="#FFFFFF" stroke="#8C6D58" stroke-width="4" stroke-linejoin="round" />
  <path d="M48 24 L48 12 L54 12 L60 24 Z" fill="#FF7096" stroke="#8C6D58" stroke-width="4" stroke-linejoin="round" />
  
  <!-- Sign Board (Bảng hiệu nhỏ bên hông) -->
  <rect x="42" y="30" width="8" height="12" rx="1" fill="#FFD166" stroke="#8C6D58" stroke-width="3" />
  <line x1="46" y1="33" x2="46" y2="39" stroke="#8C6D58" stroke-width="2" stroke-linecap="round" />
</svg>
