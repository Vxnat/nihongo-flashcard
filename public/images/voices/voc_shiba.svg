<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Microphone circle -->
  <circle cx="50" cy="50" r="46" fill="#FFF8EE" stroke="#FBC579" stroke-width="3"/>
  <!-- Mic head -->
  <rect x="42" y="28" width="16" height="24" rx="8" fill="#7F8C8D" stroke="#34495E" stroke-width="2"/>
  <!-- Mic metal lines -->
  <line x1="42" y1="36" x2="58" y2="36" stroke="#34495E" stroke-width="1.5"/>
  <line x1="42" y1="42" x2="58" y2="42" stroke="#34495E" stroke-width="1.5"/>
  <!-- Mic stand -->
  <path d="M50,52 L50,68" stroke="#34495E" stroke-width="2.5"/>
  <path d="M36,68 L64,68" stroke="#34495E" stroke-width="3" stroke-linecap="round"/>
  <!-- Sound waves -->
  <path d="M32,36 Q26,45 32,54" stroke="#E67E22" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M68,36 Q74,45 68,54" stroke="#E67E22" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
