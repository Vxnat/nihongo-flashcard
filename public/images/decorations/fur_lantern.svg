<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Hanging Loop & Thread -->
  <line x1="50" y1="5" x2="50" y2="20" stroke="#FFD166" stroke-width="2.5"/>
  <circle cx="50" cy="5" r="3" fill="none" stroke="#FFD166" stroke-width="1.5"/>

  <!-- Top Cap -->
  <rect x="36" y="20" width="28" height="6" rx="2" fill="#1C1A1A" stroke="#000" stroke-width="1.5"/>

  <!-- Lantern Body (Ribbed Red Paper) -->
  <!-- Outer Ellipse Shadow -->
  <ellipse cx="50" cy="50" rx="24" ry="25" fill="#EF476F" stroke="#1C1A1A" stroke-width="2.5"/>
  <!-- Ribbed lines -->
  <ellipse cx="50" cy="50" rx="16" ry="25" fill="none" stroke="#D81B43" stroke-width="1.5"/>
  <ellipse cx="50" cy="50" rx="8" ry="25" fill="none" stroke="#D81B43" stroke-width="1.5"/>
  <line x1="50" y1="25" x2="50" y2="75" stroke="#D81B43" stroke-width="1.5"/>

  <!-- Kanji Character "祭" (Festival - simplified/stylized) or "🏮" logo -->
  <circle cx="50" cy="50" r="10" fill="#FAF6EE" stroke="#1C1A1A" stroke-width="1.5"/>
  <!-- Stylized festival character -->
  <path d="M46,45 L54,45 M50,42 L50,54 M45,51 L55,51 M47,56 L44,59 M53,56 L56,59" stroke="#1C1A1A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Bottom Cap -->
  <rect x="36" y="74" width="28" height="6" rx="2" fill="#1C1A1A" stroke="#000" stroke-width="1.5"/>

  <!-- Bottom Tassel (Yellow) -->
  <path d="M50,80 L50,95 M48,95 L52,95 M47,85 L53,85" stroke="#FFD166" stroke-width="3" stroke-linecap="round"/>
</svg>
