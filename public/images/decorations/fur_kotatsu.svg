<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Floor Shadow -->
  <ellipse cx="50" cy="85" rx="40" ry="10" fill="#E8DCD0"/>

  <!-- Blanket (Draped Kotatsu Futon) -->
  <!-- Back/sides of blanket -->
  <path d="M22,50 L78,50 L92,85 C90,88 10,88 8,85 Z" fill="#EF476F" stroke="#1C1A1A" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Decorative Stripe on blanket -->
  <path d="M17,65 C30,70 70,70 83,65 L87,75 C70,80 30,80 13,75 Z" fill="#FFD166" opacity="0.9"/>
  <!-- Fold creases -->
  <path d="M22,50 L12,85 M78,50 L88,85" stroke="#9E1B38" stroke-width="2" stroke-linecap="round"/>

  <!-- Wooden Table Top (Isometric View) -->
  <polygon points="25,45 75,45 83,55 17,55" fill="#8C6D58" stroke="#1C1A1A" stroke-width="2.5" stroke-linejoin="round"/>
  <polygon points="27,46 73,46 80,54 20,54" fill="#A0785C"/>

  <!-- Bowl of Mandarins (Mikan) on top -->
  <!-- Bowl -->
  <ellipse cx="50" cy="50" rx="6" ry="2.5" fill="#06D6A0" stroke="#1C1A1A" stroke-width="1.5"/>
  <!-- Oranges (three orange circles inside/above bowl) -->
  <circle cx="47" cy="48" r="2.5" fill="#FF9F1C" stroke="#1C1A1A" stroke-width="1"/>
  <circle cx="53" cy="48" r="2.5" fill="#FF9F1C" stroke="#1C1A1A" stroke-width="1"/>
  <circle cx="50" cy="46" r="2.5" fill="#FF9F1C" stroke="#1C1A1A" stroke-width="1"/>
  <!-- Green leaf details on top orange -->
  <path d="M50,44 C50,43 52,43 51,44 Z" fill="#048c68"/>
</svg>
