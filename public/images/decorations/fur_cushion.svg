<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Cushion Shadow -->
  <ellipse cx="50" cy="80" rx="35" ry="8" fill="#D2B48C" opacity="0.6"/>
  
  <!-- Cushion Body -->
  <path d="M20,40 C15,35 15,65 20,70 C25,75 75,75 80,70 C85,65 85,35 80,40 C75,45 25,45 20,40 Z" fill="#8C6D58" stroke="#5C4033" stroke-width="3" stroke-linejoin="round"/>
  <path d="M20,40 C25,35 75,35 80,40 C83,43 83,63 80,66 C75,70 25,70 20,66 C17,63 17,43 20,40 Z" fill="#A0785C"/>
  
  <!-- Corner Tassels (Cute Yellow Threads) -->
  <!-- Top Left -->
  <path d="M16,40 L10,36 M16,40 L8,42" stroke="#FFD166" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Top Right -->
  <path d="M84,40 L90,36 M84,40 L92,42" stroke="#FFD166" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bottom Left -->
  <path d="M17,66 L10,70 M17,66 L11,74" stroke="#FFD166" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bottom Right -->
  <path d="M83,66 L90,70 M83,66 L89,74" stroke="#FFD166" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Traditional Cushion Indent (Tuft/Button) -->
  <circle cx="50" cy="53" r="4" fill="#5C4033"/>
  <path d="M50,47 L50,59 M44,53 L56,53" stroke="#FFD166" stroke-width="1.5" stroke-linecap="round"/>
</svg>
