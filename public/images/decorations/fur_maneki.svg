<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Floor Shadow -->
  <ellipse cx="50" cy="90" rx="25" ry="6" fill="#E8DCD0"/>

  <!-- Red Cushion below cat -->
  <path d="M26,84 C26,80 74,80 74,84 C74,88 26,88 26,84 Z" fill="#EF476F" stroke="#1C1A1A" stroke-width="2"/>
  <path d="M22,86 C22,83 78,83 78,86 C78,90 22,90 22,86 Z" fill="#D81B43" stroke="#1C1A1A" stroke-width="2"/>

  <!-- Cat Body -->
  <circle cx="50" cy="62" r="22" fill="#FFFFFF" stroke="#1C1A1A" stroke-width="2.5"/>
  <!-- Cat Head -->
  <circle cx="50" cy="40" r="18" fill="#FFFFFF" stroke="#1C1A1A" stroke-width="2.5"/>

  <!-- Ears -->
  <!-- Left Ear -->
  <polygon points="34,28 42,16 48,26" fill="#FFFFFF" stroke="#1C1A1A" stroke-width="2.5" stroke-linejoin="round"/>
  <polygon points="36,27 41,19 45,26" fill="#FF7096"/>
  <!-- Right Ear -->
  <polygon points="66,28 58,16 52,26" fill="#FFFFFF" stroke="#1C1A1A" stroke-width="2.5" stroke-linejoin="round"/>
  <polygon points="64,27 59,19 55,26" fill="#FF7096"/>

  <!-- Face details -->
  <!-- Eyes -->
  <path d="M40,38 C40,36 44,36 44,38" fill="none" stroke="#1C1A1A" stroke-width="2" stroke-linecap="round"/>
  <path d="M56,38 C56,36 60,36 60,38" fill="none" stroke="#1C1A1A" stroke-width="2" stroke-linecap="round"/>
  <!-- Red Cheeks -->
  <circle cx="38" cy="43" r="2.5" fill="#FF7096" opacity="0.6"/>
  <circle cx="62" cy="43" r="2.5" fill="#FF7096" opacity="0.6"/>
  <!-- Nose/Mouth -->
  <circle cx="50" cy="42" r="1.5" fill="#1C1A1A"/>
  <path d="M48,45 Q50,47 50,45 Q50,47 52,45" fill="none" stroke="#1C1A1A" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="33" y1="40" x2="27" y2="39" stroke="#1C1A1A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="33" y1="43" x2="27" y2="44" stroke="#1C1A1A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="67" y1="40" x2="73" y2="39" stroke="#1C1A1A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="67" y1="43" x2="73" y2="44" stroke="#1C1A1A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Red Collar & Gold Bell -->
  <path d="M35,49 Q50,56 65,49" fill="none" stroke="#D81B43" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="50" cy="54" r="3.5" fill="#FFD166" stroke="#1C1A1A" stroke-width="1.5"/>

  <!-- Raised Waving Paw (Left side of viewer, cat's right paw) -->
  <path d="M30,62 C30,48 24,46 24,52 C24,58 28,68 28,68 Z" fill="#FFFFFF" stroke="#1C1A1A" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Red paw print detail -->
  <circle cx="26" cy="52" r="2.5" fill="#EF476F"/>

  <!-- Koban (Gold Coin) in other paw -->
  <rect x="58" y="58" width="12" height="18" rx="6" fill="#FFD166" stroke="#1C1A1A" stroke-width="2" transform="rotate(-10 64 67)"/>
  <!-- Coin text (stylized lines) -->
  <path d="M62,64 L66,62 M60,69 L64,67 M58,74 L62,72" stroke="#B28900" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Paw holding coin -->
  <circle cx="58" cy="70" r="4.5" fill="#FFFFFF" stroke="#1C1A1A" stroke-width="2"/>
</svg>
