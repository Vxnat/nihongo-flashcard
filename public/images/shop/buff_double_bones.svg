<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <circle cx="50" cy="50" r="46" fill="#FFF5F5" stroke="#FF8787" stroke-width="3" />
  
  <!-- Ribbon/string loop at the top -->
  <path d="M50,12 C42,12 38,18 42,24 C44,27 48,27 50,24 C52,27 56,27 58,24 C62,18 58,12 50,12 Z" fill="#FFE3E3" stroke="#E03131" stroke-width="2"/>
  <circle cx="50" cy="22" r="3" fill="#F03E3E"/>

  <!-- Charm Main Rectangular Body -->
  <rect x="28" y="25" width="44" height="58" rx="6" fill="#E03131" stroke="#C92A2A" stroke-width="3"/>
  
  <!-- Gold Border Details inside -->
  <rect x="32" y="29" width="36" height="50" rx="3" fill="none" stroke="#FCC419" stroke-width="1.5" stroke-dasharray="4,2"/>
  
  <!-- Crossed Bones in the center -->
  <g transform="translate(50, 48)">
    <!-- Bone 1 (diagonal) -->
    <g transform="rotate(45)">
      <rect x="-14" y="-3" width="28" height="6" fill="#FFF" rx="3"/>
      <circle cx="-14" cy="-3" r="3.5" fill="#FFF"/>
      <circle cx="-14" cy="3" r="3.5" fill="#FFF"/>
      <circle cx="14" cy="-3" r="3.5" fill="#FFF"/>
      <circle cx="14" cy="3" r="3.5" fill="#FFF"/>
    </g>
    <!-- Bone 2 (diagonal) -->
    <g transform="rotate(-45)">
      <rect x="-14" y="-3" width="28" height="6" fill="#FFF" rx="3"/>
      <circle cx="-14" cy="-3" r="3.5" fill="#FFF"/>
      <circle cx="-14" cy="3" r="3.5" fill="#FFF"/>
      <circle cx="14" cy="-3" r="3.5" fill="#FFF"/>
      <circle cx="14" cy="3" r="3.5" fill="#FFF"/>
    </g>
  </g>

  <!-- Big Gold x2 text badge on top -->
  <text x="50" y="73" fill="#FCC419" font-size="14" font-weight="900" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">x2</text>
  
  <!-- Sparkles -->
  <path d="M78,35 L80,38 L83,38 L81,40 L82,43 L79,41 L76,43 L77,40 L75,38 L78,38 Z" fill="#FCC419"/>
  <path d="M22,65 L23.5,67 L25.5,67 L24,68.5 L24.5,70.5 L22.5,69 L20.5,70.5 L21,68.5 L19.5,67 L21.5,67 Z" fill="#FCC419"/>
</svg>
