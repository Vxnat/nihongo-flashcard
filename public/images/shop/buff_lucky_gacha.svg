<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <circle cx="50" cy="50" r="46" fill="#F8F0FF" stroke="#D6BCFA" stroke-width="3" />
  
  <!-- Ribbon/string loop at the top -->
  <path d="M50,12 C42,12 38,18 42,24 C44,27 48,27 50,24 C52,27 56,27 58,24 C62,18 58,12 50,12 Z" fill="#EBF8FF" stroke="#553C9A" stroke-width="2"/>
  <circle cx="50" cy="22" r="3" fill="#553C9A"/>

  <!-- Charm Main Rectangular Body -->
  <rect x="28" y="25" width="44" height="58" rx="6" fill="#744210" stroke="#521B10" stroke-width="3"/>
  
  <!-- Outer fabric layer - Purple omamori style -->
  <rect x="28" y="25" width="44" height="58" rx="6" fill="#6B46C1" stroke="#553C9A" stroke-width="2.5"/>

  <!-- Gold Border Details inside -->
  <rect x="32" y="29" width="36" height="50" rx="3" fill="none" stroke="#D69E2E" stroke-width="1.5" stroke-dasharray="4,2"/>
  
  <!-- Glowing Gacha Ball/Egg in center -->
  <g transform="translate(50, 48)">
    <circle cx="0" cy="0" r="14" fill="#FAF089" stroke="#D69E2E" stroke-width="1.5"/>
    <path d="M-13.5,0 A14,14 0 0,0 13.5,0 Z" fill="#ED8936" stroke="#DD6B20" stroke-width="1.5"/>
    <line x1="-13.8" y1="0" x2="13.8" y2="0" stroke="#D69E2E" stroke-width="2"/>
    <circle cx="0" cy="0" r="3" fill="#FFF" stroke="#D69E2E" stroke-width="1"/>
  </g>

  <!-- Big Star/Sparkle Symbol on bottom center -->
  <g transform="translate(50, 68) scale(0.8)">
    <polygon points="0,-10 3,-3 10,-3 5,2 7,9 0,5 -7,9 -5,2 -10,-3 -3,-3" fill="#D69E2E"/>
  </g>
  
  <!-- Sparkles -->
  <path d="M78,35 L80,38 L83,38 L81,40 L82,43 L79,41 L76,43 L77,40 L75,38 L78,38 Z" fill="#FAF089"/>
  <path d="M22,65 L23.5,67 L25.5,67 L24,68.5 L24.5,70.5 L22.5,69 L20.5,70.5 L21,68.5 L19.5,67 L21.5,67 Z" fill="#FAF089"/>
</svg>
